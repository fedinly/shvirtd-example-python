x-env_file: &env_file
  env_file:
    - .env
x-restart: &restart
  restart: always #no, on-failure , always(default), unless-stopped
include:
  - proxy.yaml
  - backup.yaml

services:
  db:
    image: mysql:8
    networks:
      backend:
        ipv4_address: 172.20.0.10
    <<: [*env_file, *restart]
    environment:
      - MYSQL_ROOT_PASSWORD_FILE=/run/secrets/db_root_pw
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD_FILE=/run/secrets/db_user_pw
      - MYSQL_ROOT_HOST="%"
      - MYSQL_BACKUPER_PASSWORD_FILE=/run/secrets/db_backup_pw
      - MYSQL_BACKUPER_USER=backup-05
    secrets:
       - db_root_pw
       - db_user_pw
       - db_backup_pw
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql:/docker-entrypoint-initdb.d
        #- ./mysql/entrypoint.sh:/usr/bin/entrypoint.sh
        # command: /bin/bash -c "/usr/bin/entrypoint.sh"
    command: --mysql-native-password=ON
        # command: --default-authentication-plugin=mysql_native_password
  web:
    build:
      context: .
      dockerfile: Dockerfile.python
    depends_on: ["db"]
    networks:
      backend:
        ipv4_address: 172.20.0.5
    <<: [*env_file, *restart]
    environment:
      - DB_NAME=${MYSQL_DATABASE}
      - DB_USER=${MYSQL_USER}
      - DB_HOST=db
      - DB_TBL_NAME=entries
    secrets:
      - db_user_pw

volumes:
  db_data: {}
networks:
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
secrets:
  db_root_pw:
    file: ./secrets/db_root_pw.txt
  db_user_pw:
    file: ./secrets/db_user_pw.txt
  db_backup_pw:
    file: ./secrets/db_backup_pw.txt
